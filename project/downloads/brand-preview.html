<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<title>Cyber Eye Intelligence — Brand Pack</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Geist+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; background: #0a0a0c; color: #fff; font-family: 'Space Grotesk', sans-serif; min-height: 100vh; }
  .wrap { max-width: 1200px; margin: 0 auto; padding: 64px 32px 96px; }
  h1 { font-weight: 600; font-size: 32px; letter-spacing: -0.025em; margin: 0 0 8px; }
  .sub { color: #A1A1AA; margin: 0 0 48px; font-size: 14px; }
  .label { font-family: 'Geist Mono', monospace; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: #71717A; margin: 32px 0 12px; }
  .panel { border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 56px; display: flex; align-items: center; justify-content: center; }
  .panel.light { background: #F5F4EE; }
  .panel.dark { background: #050505; }
  .panel img { max-width: 100%; height: auto; display: block; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .row.three { grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
  .panel.mark { padding: 64px; }
  .panel.mark img { width: 160px; height: 160px; }
  .panel.stacked img { max-width: 340px; }
</style>
</head><body>
<div class="wrap">
  <h1>Cyber Eye Intelligence — Brand Pack</h1>
  <p class="sub">Logomark + wordmark in Space Grotesk, tagline in Geist Mono. Forensics · Investigations · Security.</p>

  <div class="label">01 — Primary horizontal lockup · light</div>
  <div class="panel light"><img src="cyber-eye-logo-lockup-light.svg" alt="Cyber Eye Intelligence" style="max-width: 820px;"></div>

  <div class="label">02 — Primary horizontal lockup · dark</div>
  <div class="panel dark"><img src="cyber-eye-logo-lockup-dark.svg" alt="Cyber Eye Intelligence" style="max-width: 820px;"></div>

  <div class="label">03 — Stacked lockup</div>
  <div class="row">
    <div class="panel light stacked"><img src="cyber-eye-logo-stacked.svg" alt="Cyber Eye Intelligence"></div>
    <div class="panel dark stacked"><img src="cyber-eye-logo-stacked.svg" alt="Cyber Eye Intelligence" style="filter: invert(1) hue-rotate(180deg);"></div>
  </div>

  <div class="label">04 — Logomark variants</div>
  <div class="row three">
    <div class="panel mark dark"><img src="cyber-eye-logomark.svg" alt="emerald"></div>
    <div class="panel mark light"><img src="cyber-eye-logomark-black.svg" alt="black"></div>
    <div class="panel mark dark"><img src="cyber-eye-logomark-white.svg" alt="white"></div>
  </div>
</div>
</body></html>
