name: Security

on:
  schedule:
    # Every Monday at 08:00 IST (02:30 UTC)
    - cron: '30 2 * * 1'
  pull_request:
    branches: [main]
    paths:
      - 'project/nextjs-template/package*.json'

jobs:
  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: project/nextjs-template
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: project/nextjs-template/package-lock.json
      - run: npm ci
      - name: Audit (high+critical only)
        run: npm audit --audit-level=high

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
